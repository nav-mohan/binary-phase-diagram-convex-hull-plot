<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ternary Gibbs Triangle Explorer</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.184.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.184.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div class="page">
    <h1>Ternary Gibbs Triangle Explorer</h1>
    <div class="subtext">Plot formation energies and lower convex-hull facets for a three-component system.</div>
    <div class="layout">
      <div class="panel">
        <div class="controls">
          <div class="toggle-dimension">
            <input type="radio" name="toggle-dimension" value=2 onclick="ToggleDimension(this.value)"> 2D
            <input type="radio" name="toggle-dimension" value=3 onclick="ToggleDimension(this.value)" checked> 3D
            <input type="radio" name="toggle-dimension" value="4" disabled title="Not implemented yet"> 4D
          </div>
          <div class="species-row">
            <div>
              <label for="species1">A</label>
              <select id="species1"></select>
            </div>
            <div>
              <label for="species2">B</label>
              <select id="species2"></select>
            </div>
            <div>
              <label for="species3">C</label>
              <select id="species3"></select>
            </div>
            <div>
              <label for="species4">D</label>
              <select id="species4"></select>
            </div>
          </div>
          <div>
            <label for="model">Model ID (optional)</label>
            <input id="model" type="text" placeholder="OpenKIM model ID" />
          </div>
          <div class="row">
            <button id="plotBtn">Plot hull</button>
            <button id="clearModelBtn" class="secondary">Clear model</button>
          </div>
          <div class="row">
            <button id="topViewBtn" class="secondary">Top view</button>
            <button id="surfaceViewBtn" class="secondary">Energy view</button>
          </div>
          <div id="status" class="status"></div>
          <div class="meta" id="meta"></div>
        </div>
      </div>
      <div class="panel plot-panel">
        <div id="plotContainer2D">
          <svg id="plot2D" viewBox="0 0 900 680" preserveAspectRatio="xMidYMid meet"></svg>
          <div id="tooltip2D" class="tooltip2D"></div>
        </div>
        <div id="plotContainer3D">
          <div id="labelLayer"></div>
          <div id="tooltip3D" class="tooltip"></div>
        </div>
        <div class="legend">
          <span><span class="swatch" style="background:#c026d3"></span>Reference lower hull</span>
          <span><span class="swatch" style="background:#111827"></span>Model lower hull</span>
          <span><span class="swatch" style="background:#2563eb"></span>Stable point</span>
        </div>
      </div>
    </div>
  </div>
  <script src="globals.js"></script>
  <script src="utils_htmlElements.js"></script>
  <script src="utils_dataParser.js"></script>
  <script src="utils_apiQuery.js"></script>
  <script src="utils_compute2D.js"></script>
  <script src="utils_chart2D.js"></script>
  <script type="module" src="ternary_app.js"></script>
  <script src="script.js"></script>
  <script>window.addEventListener('load', () => { PopulateSpeciesDropdown(); ToggleDimension(3); });</script>
</body>
</html>
